services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_knowledge_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abc@123}
      POSTGRES_DB: ${POSTGRES_DB:-ai_knowledge}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_knowledge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ai-knowledge-assistant-backend
    container_name: ai_knowledge_backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:abc%40123@db:5432/ai_knowledge}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ai-knowledge-assistant-frontend
    container_name: ai_knowledge_frontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
