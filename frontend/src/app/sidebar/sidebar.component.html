<div class="sidebar-wrapper">
  <div class="sidebar-brand">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="brand-icon">
      <path d="M12 2a10 10 0 0 1 7.54 16.59c-.24.25-.62.3-.92.14l-.08-.04a1 1 0 0 0-1 0l-.33.16a2 2 0 0 1-2.07-.18 2 2 0 0 0-2.27 0 2 2 0 0 1-2.07.18l-.33-.16a1 1 0 0 0-1 0l-.08.04c-.3.16-.68.1-.92-.14A10 10 0 0 1 12 2z"></path>
      <path d="M12 18v4"></path>
      <path d="M4.93 4.93l1.41 1.41"></path>
      <path d="M17.66 6.34l1.41-1.41"></path>
      <path d="M2 12h4"></path>
      <path d="M18 12h4"></path>
    </svg>
    <span>AI Assistant</span>
  </div>
  
  <p class="sidebar-desc">Manage documents and run neural queries against your content.</p>
  
  <nav class="sidebar-nav">
    <a class="nav-item" [class.active]="activeTab === 'dashboard'" (click)="selectTab('dashboard')">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
      <span>Dashboard</span>
    </a>
    
    <a class="nav-item" [class.active]="activeTab === 'documents'" (click)="selectTab('documents')">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
      <span>Documents</span>
    </a>
    
    <a class="nav-item" [class.active]="activeTab === 'chat-history'" (click)="selectTab('chat-history')">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      <span>Chat history</span>
    </a>
  </nav>
  
  <div class="sidebar-footer">
    <div class="user-profile-card" *ngIf="auth.currentUser$ | async as user">
      <div class="user-avatar">
        {{ user.username.substring(0, 2).toUpperCase() }}
      </div>
      <div class="user-info">
        <span class="user-name" [title]="user.username">{{ user.username }}</span>
        <span class="user-email" [title]="user.email">{{ user.email }}</span>
      </div>
    </div>

    <button class="logout-btn" (click)="auth.logout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      <span>Log out</span>
    </button>
  </div>
</div>
