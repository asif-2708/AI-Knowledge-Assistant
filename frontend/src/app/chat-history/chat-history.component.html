<div class="card history-card fade-in">
  <div class="card-header-flex">
    <div class="header-text">
      <h2>Chat History</h2>
      <p>Review your previous interactions and queries.</p>
    </div>
    <button class="secondary clear-btn" (click)="clear()" [disabled]="history.length === 0">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        <line x1="10" y1="11" x2="10" y2="17"></line>
        <line x1="14" y1="11" x2="14" y2="17"></line>
      </svg>
      Clear History
    </button>
  </div>
  
  <div *ngIf="history.length === 0" class="empty-state">
    <div class="empty-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
      </svg>
    </div>
    <h3>No conversation history</h3>
    <p>Your previous AI queries will appear here.</p>
  </div>

  <ul class="history-list" *ngIf="history.length > 0">
    <li *ngFor="let entry of history; let idx = index" class="history-item fade-in">
      <button class="delete-item-btn" (click)="deleteItem(idx)" title="Delete this chat entry">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
      </button>
      <div class="query-bubble">
        <span class="label">You asked:</span>
        <strong>{{ entry.question }}</strong>
      </div>
      <div class="answer-bubble">
        <div class="ai-badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a10 10 0 0 1 7.54 16.59c-.24.25-.62.3-.92.14l-.08-.04a1 1 0 0 0-1 0l-.33.16a2 2 0 0 1-2.07-.18 2 2 0 0 0-2.27 0 2 2 0 0 1-2.07.18l-.33-.16a1 1 0 0 0-1 0l-.08.04c-.3.16-.68.1-.92-.14A10 10 0 0 1 12 2z"></path>
          </svg>
          AI Response
        </div>
        <p>{{ getDisplayText(entry.answer, idx) }}</p>
        <button *ngIf="isLongText(entry.answer)" class="expand-toggle-btn" (click)="toggleExpand(idx)" type="button">
          <span>{{ isExpanded(idx) ? 'Show Less' : 'Show More' }}</span>
          <svg *ngIf="!isExpanded(idx)" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
          <svg *ngIf="isExpanded(idx)" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
          </svg>
        </button>
      </div>
    </li>
  </ul>
</div>
